<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 14px 0;
      color: #cba6f7;
      font-weight: 600;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .badge.active  { background: #1a3a2a; color: #a6e3a1; }
    .badge.paused  { background: #3a2e00; color: #fde047; }
    .pause-btn {
      width: 100%;
      padding: 7px 0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 14px;
      transition: opacity .15s;
    }
    .pause-btn:hover { opacity: .85; }
    .pause-btn.do-pause   { background: #3a2e00; color: #fde047; }
    .pause-btn.do-resume  { background: #1a3a2a; color: #a6e3a1; }
    hr {
      border: none;
      border-top: 1px solid #313244;
      margin: 0 0 12px 0;
    }
    .hint-pause {
      font-size: 11px;
      color: #6c7086;
      margin: -6px 0 12px 0;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #45475a;
      border-radius: 20px;
      cursor: pointer;
      transition: .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: .2s;
    }
    input:checked + .slider { background: #a6e3a1; }
    input:checked + .slider::before { transform: translateX(16px); }
    .debug-hint {
      font-size: 11px;
      color: #6c7086;
      margin: 4px 0 0 0;
      display: none;
    }
  </style>
</head>
<body>
  <h2>3D Model Auto-Downloader</h2>

  <div class="row">
    <span>Status</span>
    <span class="badge active" id="statusBadge">Aktiv</span>
  </div>
  <button class="pause-btn do-pause" id="pauseBtn">Bis zum Neustart deaktivieren</button>
  <p class="hint-pause" id="pauseHint">Downloads werden ignoriert bis der Browser neu gestartet wird.</p>

  <hr>

  <div class="row">
    <span>Debug-Modus</span>
    <label class="toggle">
      <input type="checkbox" id="debugToggle">
      <span class="slider"></span>
    </label>
  </div>
  <p class="debug-hint" id="debugHint">Zeigt detaillierte Logs in der Browser-Konsole (F12). Seite neu laden zum Aktivieren.</p>

  <script src="popup.js"></script>
</body>
</html>
